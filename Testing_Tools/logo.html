<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BizzDeal Logo Animation</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffffff;
            margin: 0;
            font-family: sans-serif;
        }

        .logo-container {
            width: 400px;
            height: 520px;
            position: relative;
        }

        svg {
            width: 100%;
            height: 100%;
        }

        .globe-line {
            fill: none;
            stroke: url(#globe-gradient);
            /* Gradient based on the logo */
            stroke-width: 8;
            stroke-linecap: butt;
            /* Based on the image, line endings might be cut straight by the arrow later */
            stroke-dasharray: 600;
            /* Long enough to cover the longest path (outer circle) */
            stroke-dashoffset: 600;
            animation: drawGlobe 2s ease-in-out forwards;
        }

        @keyframes drawGlobe {
            to {
                stroke-dashoffset: 0;
            }
        }

        .bar {
            fill: #939598;
            /* Gray color for bars */
            stroke: #ffffff;
            /* White border to cut through globe lines */
            stroke-width: 18;
            /* Doubled white border */
            stroke-linejoin: miter;
            vector-effect: non-scaling-stroke;
            transform-box: fill-box;
            transform-origin: bottom;
            transform: scaleY(0);
            animation: growBar 0.8s ease-out forwards;
        }

        /* Delays for bars so they animate one by one after the globe is drawn (2s delay) */
        .bar-1 {
            animation-delay: 2s;
        }

        .bar-2 {
            animation-delay: 2.2s;
        }

        .bar-3 {
            animation-delay: 2.4s;
        }

        @keyframes growBar {
            to {
                transform: scaleY(1);
            }
        }

        .arrow {
            fill: #939598;
            /* Gray color matching bars */
            stroke: #ffffff;
            /* White border to cut through globe and bars */
            stroke-width: 12;
            /* Matched to the thickened bars */
            stroke-linejoin: miter;
            /* Makes the arrowhead corners razor sharp */
            paint-order: stroke fill;
            /* Draws stroke under the fill, preserving the perfect shape */
        }

        #arrow-reveal-rect {
            /* Arrow shoots out after bars finish (2.4s + 0.8s = 3.2s) */
            animation: revealArrow 0.6s ease-in-out 3.2s forwards;
        }

        @keyframes revealArrow {
            to {
                width: 200px;
            }
        }

        .bottom-image {
            opacity: 0;
            transform: translateY(10px);
            animation: revealImage 0.8s ease-out 3.8s forwards;
        }

        @keyframes revealImage {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="logo-container">
        <svg viewBox="0 0 200 260" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="globe-gradient" x1="10" y1="10" x2="190" y2="190" gradientUnits="userSpaceOnUse">
                    <stop offset="0%" stop-color="#4ea6f2" />
                    <stop offset="100%" stop-color="#1651a1" />
                </linearGradient>
                <!-- Clip path perfectly follows the globe circle so bars don't spill out the bottom -->
                <clipPath id="globe-clip">
                    <circle cx="100" cy="100" r="90" />
                </clipPath>
                <!-- Clip path to animate the arrow shooting out from left to right -->
                <clipPath id="arrow-clip">
                    <rect x="0" y="0" width="0" height="200" id="arrow-reveal-rect" />
                </clipPath>
            </defs>
            <g id="globe">
                <!-- Outer Circle -->
                <circle cx="100" cy="100" r="90" class="globe-line" />

                <!-- Center Vertical Line -->
                <line x1="100" y1="10" x2="100" y2="190" class="globe-line" />

                <!-- Inner Vertical Ellipse (Left and Right Arcs) -->
                <ellipse cx="100" cy="100" rx="45" ry="90" class="globe-line" />

                <!-- Top Horizontal Line -->
                <line x1="22" y1="55" x2="178" y2="55" class="globe-line" />

                <!-- Middle Horizontal Line (Equator) -->
                <line x1="10" y1="100" x2="190" y2="100" class="globe-line" />

                <!-- Bottom Horizontal Line -->
                <line x1="22" y1="145" x2="178" y2="145" class="globe-line" />
            </g>

            <!-- Bars Group -->
            <g id="bars" clip-path="url(#globe-clip)">
                <!-- Left Bar (Left of center line) -->
                <rect x="56" y="115" width="30" height="90" class="bar bar-1" />

                <!-- Middle Bar (Right of center line) -->
                <rect x="94" y="95" width="30" height="110" class="bar bar-2" />

                <!-- Right Bar (Far right) -->
                <rect x="132" y="65" width="30" height="140" class="bar bar-3" />
            </g>

            <!-- Arrow Group -->
            <g id="arrow-group" clip-path="url(#arrow-clip)">
                <!-- 
                Curved Arrow Path (Slightly Thicker Body):
                M 25 120 - pointy tail center
                Q 84 130 170 56 - curved bottom of shaft (adjusted for thickness)
                L 180 67 - bottom corner of arrowhead
                L 195 24 - tip of arrowhead
                L 150 34 - top corner of arrowhead
                L 160 45 - top corner where shaft meets arrowhead (adjusted for thickness)
                Q 82 112 25 120 - curved top of shaft back to point (adjusted for thickness)
                Z - close tail
                -->
                <path d="M 25 120 Q 84 130 170 56 L 180 67 L 195 24 L 150 34 L 160 45 Q 82 112 25 120 Z"
                    class="arrow" />
            </g>

            <!-- Image below the globe -->
            <image href="pdf_page-0003-removebg-preview.png" x="10" y="200" width="180" height="50" preserveAspectRatio="xMidYMid meet" class="bottom-image" />
        </svg>
    </div>
</body>

</html>
